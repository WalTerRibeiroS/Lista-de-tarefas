<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/849cc94242.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="fundo">

        <h1>Minhas tarefas</h1>

        <div class="card">
            <div class="container-input">
                <input id="AdicionarTarefa" class="textoInput" type="text" autocomplete="off" placeholder="Adicione a sua tarefa...">
                <i class="fa-solid fa-pen"></i>
            </div>
        </div>

        <div class="card-checkbox"></div>

    </div>
    
    <script src="index.js"></script>
</body>
</html>
